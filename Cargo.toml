[package]
name = "solsim"
version = "0.1.0"
edition = "2021"

[dependencies]
anyhow = "1.0"
base64 = "0.22"
bs58 = "0.5"
bincode = "1.3"
clap = { version = "4.5.51", features = ["derive"] }
env_logger = "0.11"
litesvm = "0.8.1"
log = "0.4"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
solana-account = "3.0"
solana-clock = "3.0"
solana-hash = "3.0"
solana-pubkey = "3.0"
solana-keypair = "3.0"
solana-transaction = "3.0"
solana-transaction-status-client-types = "3.0"
solana-rpc-client-types = "3.0"
solana-client = "3.0"
solana-message = "3.0"
solana-address-lookup-table-interface = "3.0"
solana-commitment-config = "3.0"
solana-slot-hashes = "3.0"
thiserror = "1.0"
solana-loader-v3-interface = "6.1.0"
solana-sdk-ids = "3.0"
solana-sysvar-id = "3.0"
solana-signature = "3.0"
solana-signer = "3.0"
solana-system-interface = { version = "3.0", features = ["bincode"] }
hex = "0.4"
colored = "2.1"

[dev-dependencies]
assert_cmd = "2.0"
