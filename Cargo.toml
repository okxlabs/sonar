[package]
name = "solsim"
version = "0.1.0"
edition = "2021"

[dependencies]
anyhow = "1.0"
base64 = "0.22"
bs58 = "0.5"
bincode = "1.3"
clap = { version = "4.5.51", features = ["derive"] }
env_logger = "0.11"
litesvm = "0.8.1"
log = "0.4"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
solana-account = "3.2.0"
solana-clock = "3.0.0"
solana-hash = "3.1.0"
solana-pubkey = "4.0.0"
solana-transaction = "3.0.2"
solana-transaction-status-client-types = "2.2.1"
solana-rpc-client-types = "2.2.1"
solana-sdk = "2.2.0"
solana-client = "2.2.1"
solana-message = "2.2.1"
solana-address-lookup-table-interface = "2.2.2"
solana-slot-hashes = "3.0.0"
thiserror = "1.0"
solana-loader-v3-interface = "6.1.0"
solana-sdk-ids = "3.0.0"
hex = "0.4"
colored = "2.1"

[dev-dependencies]
assert_cmd = "2.0"
